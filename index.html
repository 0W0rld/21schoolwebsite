<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Школа №21</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="nav-container">
    <div class="logo">Школа №21</div>
    <nav>
      <ul>
        <li><a href="#home">Главная</a></li>
        <li><a href="#about">О школе</a></li>
        <li><a href="#gallery">Галерея</a></li>
        <li><a href="#quiz">Викторина</a></li>
      </ul>
    </nav>
  </div>
</header>

<section id="home">
  <div class="card home-card">
    <div class="arrows">⬆ ⬆ ⬆</div>
    <h1 class="school-title">Школа №21</h1>
    <div class="buttons">
      <a href="#gallery"><button>Фотогалерея</button></a>
      <a href="#quiz"><button>Викторина</button></a>
    </div>
    <div class="theme-card">
      <button id="themeToggle" class="theme-btn">☀️</button>
    </div>
  </div>
</section>

<section id="about">
  <div class="card content-card fade">
    <h2>О школе</h2>
    <p>Наша школа — современное образовательное учреждение.</p>
  </div>
</section>

<section id="gallery">
  <div class="card content-card fade">
    <h2>Галерея</h2>
    <div class="gallery-grid">
      <div class="gallery-item" onclick="openFolder('teachers')" style="cursor:pointer; border-style: solid;">
        <span>👨‍🏫 Фотки Учителей</span>
      </div>
      <div class="gallery-item" onclick="openFolder('school')" style="cursor:pointer; border-style: solid;">
        <span>🏫 Фотки нашей школы</span>
      </div>
    </div>
  </div>
</section>

<div id="gallery-overlay" class="folder-overlay" style="display:none;">
  <div class="card folder-content">
    <button class="reset-btn" onclick="closeFolder()" style="margin-bottom:20px;">← Назад</button>
    <h2 id="folder-title">Заголовок</h2>
    <div id="photo-list" class="gallery-grid">
      </div>
  </div>
</div>

<section id="quiz">
  <div class="card content-card fade">
    <h2>Викторина</h2>
    
    <div id="quiz-setup">
      <p>Настройте викторину:</p>
      <div class="setup-group">
        <button class="setup-btn" onclick="setQuizOption(this, 'grade', 7)">7 класс</button>
        <button class="setup-btn" onclick="setQuizOption(this, 'grade', 8)">8 класс</button>
      </div>
      <div class="setup-group">
        <button class="setup-btn" onclick="setQuizOption(this, 'level', 'hard')">Учусь на 4–5</button>
        <button class="setup-btn" onclick="setQuizOption(this, 'level', 'easy')">Учусь на 2–3</button>
      </div>
      <div class="setup-group">
        <button class="setup-btn" onclick="setQuizOption(this, 'subject', 'russian')">Русский</button>
        <button class="setup-btn" onclick="setQuizOption(this, 'subject', 'history')">История</button>
        <button class="setup-btn" onclick="setQuizOption(this, 'subject', 'math')">Математика</button>
      </div>
    </div>

    <div id="quiz-main" style="display:none; opacity: 0; transition: 0.5s;">
      <h3 id="quiz-question"></h3>
      <div class="quiz-options-container">
        <div class="quiz-option" onclick="handleAnswer(0)">
          <div class="option-circle"></div>
          <span class="option-text"></span>
        </div>
        <div class="quiz-option" onclick="handleAnswer(1)">
          <div class="option-circle"></div>
          <span class="option-text"></span>
        </div>
        <div class="quiz-option" onclick="handleAnswer(2)">
          <div class="option-circle"></div>
          <span class="option-text"></span>
        </div>
      </div>
      <button onclick="resetQuiz()" class="reset-btn">Заново</button>
    </div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
